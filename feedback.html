<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback | MNHS CAT Corps</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Poppins:wght@300;400;700&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>

    <style>
        body {
            background-color: #051a0b;
            font-family: 'Poppins', sans-serif;
            color: white;
            background-image: radial-gradient(circle at top right, rgba(20, 83, 45, 0.4), transparent);
            min-height: 100vh;
        }
        .heading-font { font-family: 'Montserrat', sans-serif; }
        
        .marquee {
            background: #fbbf24;
            color: #051a0b;
            font-weight: 800;
            text-transform: uppercase;
            font-size: 10px;
            letter-spacing: 2px;
            padding: 8px 0;
            overflow: hidden;
            white-space: nowrap;
        }
        .marquee-content {
            display: inline-block;
            animation: marquee 20s linear infinite;
        }
        @keyframes marquee {
            0% { transform: translateX(100%); }
            100% { transform: translateX(-100%); }
        }

        .glass-nav {
            background: rgba(5, 26, 11, 0.95);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        input, textarea {
            background: rgba(255, 255, 255, 0.05) !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            color: white !important;
        }
        input:focus, textarea:focus {
            border-color: #fbbf24 !important;
            outline: none;
            box-shadow: 0 0 15px rgba(251, 191, 36, 0.2);
        }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
    </style>
</head>
<body class="flex flex-col">

    <div class="marquee">
        <div class="marquee-content">
            📢 UPDATES: Submit your suggestions or report issues here. We value your feedback for the improvement of MNHS CAT Corps! 🎖️
        </div>
    </div>

    <nav class="glass-nav sticky top-0 w-full z-50 h-20 flex items-center">
        <div class="max-w-7xl mx-auto px-6 w-full flex justify-between items-center">
            <div class="flex items-center space-x-4">
                <p class="text-white font-black uppercase text-sm">MNHS CAT CLUB</p>
            </div>
            <a href="index.html" class="text-[10px] font-bold uppercase tracking-widest text-yellow-500 underline">Back to Home</a>
        </div>
    </nav>

    <main class="flex-grow flex items-center justify-center py-20 px-6">
        <div class="max-w-xl w-full glass-card p-10 rounded-[2.5rem]" data-aos="zoom-in">
            <header class="text-center mb-10">
                <span class="text-yellow-500 font-black tracking-[0.4em] text-[9px] uppercase">Official Report Form</span>
                <h1 class="heading-font text-4xl uppercase italic text-white mt-2">Feedback</h1>
                <div class="h-1 w-16 bg-yellow-500 mx-auto mt-4 rounded-full"></div>
            </header>

            <form action="https://formspree.io/f/xvzwvpzv" method="POST" id="feedbackForm" class="space-y-6">
                <div>
                    <label class="block text-[10px] font-bold uppercase text-yellow-500 mb-2">Full Name</label>
                    <input type="text" name="FullName" id="name" required class="w-full px-5 py-3 rounded-xl" placeholder="Juan Dela Cruz">
                </div>

                <div>
                    <label class="block text-[10px] font-bold uppercase text-yellow-500 mb-2">Email Address</label>
                    <input type="email" name="Email" id="email" required class="w-full px-5 py-3 rounded-xl" placeholder="example@gmail.com">
                </div>

                <div>
                    <label class="block text-[10px] font-bold uppercase text-yellow-500 mb-2">Your Message</label>
                    <textarea name="Message" id="message" rows="4" required class="w-full px-5 py-3 rounded-xl resize-none" placeholder="Write your report or feedback here..."></textarea>
                </div>

                <button type="submit" id="submitBtn" class="w-full bg-yellow-500 text-green-950 py-4 rounded-xl font-black uppercase text-xs tracking-[0.2em] hover:bg-white transition-all shadow-xl">
                    Submit Report
                </button>
            </form>
        </div>
    </main>

    <script>
        AOS.init({ duration: 1000, once: true });

        const feedbackForm = document.getElementById('feedbackForm');
        const submitBtn = document.getElementById('submitBtn');

        feedbackForm.addEventListener('submit', async function(e) {
            e.preventDefault();

            // Same validation as Join page
            const nameValue = document.getElementById('name').value.trim();
            const emailValue = document.getElementById('email').value.toLowerCase().trim();

            if (/\d/.test(nameValue)) {
                alert("❌ INVALID NAME: Numbers are not allowed!");
                return;
            }

            if (!emailValue.endsWith("@gmail.com")) {
                alert("❌ INVALID EMAIL: Please use '@gmail.com' only!");
                return;
            }

            // UI Feedback: Sending state
            submitBtn.disabled = true;
            submitBtn.innerText = "SENDING REPORT...";

            const formData = new FormData(this);

            try {
                const response = await fetch(this.action, {
                    method: 'POST',
                    body: formData,
                    headers: { 'Accept': 'application/json' }
                });

                if (response.ok) {
                    alert("✅ SUCCESS: Your feedback has been sent to the CAT Officers.");
                    this.reset(); // AUTO-DELETE: Lilinisin ang fields pagka-submit
                } else {
                    alert("❌ ERROR: Something went wrong with the submission.");
                }
            } catch (error) {
                alert("❌ NETWORK ERROR: Check your connection.");
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerText = "SUBMIT REPORT";
            }
        });
    </script>
</body>
</html>
