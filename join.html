<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join | MNHS CAT Corps</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Poppins:wght@300;400;700&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>

    <style>
        body {
            background-color: #051a0b;
            font-family: 'Poppins', sans-serif;
            color: white;
            background-image: radial-gradient(circle at top right, rgba(20, 83, 45, 0.4), transparent);
            background-attachment: fixed;
            min-height: 100vh;
        }
        .heading-font { font-family: 'Montserrat', sans-serif; }

        .glass-nav {
            background: rgba(5, 26, 11, 0.95);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .cat-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .input-style {
            background: rgba(255, 255, 255, 0.05) !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            color: white !important;
            transition: all 0.3s ease;
        }

        .input-style:focus {
            border-color: #fbbf24 !important;
            box-shadow: 0 0 10px rgba(251, 191, 36, 0.3);
            outline: none;
        }

        @keyframes pump {
            0% { transform: scale(1); }
            50% { transform: scale(1.02); }
            100% { transform: scale(1); }
        }
        .pump-btn:hover { animation: pump 0.4s ease-in-out; }
        
        select option { background: #051a0b; color: white; }
    </style>
</head>
<body class="pb-20">

    <nav class="glass-nav sticky top-0 w-full z-50 h-20 flex items-center">
        <div class="max-w-7xl mx-auto px-6 w-full flex justify-between items-center">
            <div class="flex items-center space-x-4">
                <div class="flex -space-x-2">
                    <img src="https://i.imgur.com/UumgAmR.png" class="h-10 w-10 rounded-full border border-white/20 bg-white">
                    <img src="https://i.imgur.com/ezYRCVu.jpeg" class="h-10 w-10 rounded-full border border-white/20 bg-white">
                    <img src="https://i.imgur.com/SmhQQAd.jpeg" class="h-10 w-10 rounded-full border border-yellow-500 shadow-lg object-cover bg-white">
                </div>
                <div class="hidden sm:block leading-none">
                    <p class="text-white font-black tracking-tighter uppercase text-sm">MNHS CAT CLUB</p>
                    <p class="text-yellow-500 text-[6px] font-bold uppercase tracking-[0.3em]">Citizenship Advancement Training</p>
                </div>
            </div>

            <div class="flex items-center space-x-8">
                <ul class="flex space-x-6 text-[10px] font-bold uppercase tracking-widest">
                    <li><a href="home.html" class="text-white/70 hover:text-white transition">Home</a></li>
                    <li><a href="officers.html" class="text-white/70 hover:text-white transition">Officers</a></li>
                    <li><a href="about.html" class="text-white/70 hover:text-white transition">About</a></li>
                    <li><a href="gallery.html" class="text-white/70 hover:text-white transition">Gallery</a></li>
                    <li><a href="join.html" class="text-yellow-500 border-b-2 border-yellow-500 pb-1">Join</a></li>
                </ul>
                <a href="feedback.html" class="bg-yellow-500 text-green-950 px-5 py-2 rounded-full font-black text-[10px] uppercase tracking-widest hover:bg-white transition-all shadow-lg">Feedback</a>
            </div>
        </div>
    </nav>

    <header class="py-16 text-center" data-aos="fade-down">
        <h2 class="heading-font text-5xl md:text-6xl uppercase italic text-white tracking-tighter">Application <span class="text-yellow-500">Form</span></h2>
        <div class="h-1 w-20 bg-yellow-500 mx-auto mt-4 rounded-full shadow-[0_0_10px_#fbbf24]"></div>
    </header>

    <main class="max-w-3xl mx-auto px-6" data-aos="fade-up">
        <div class="cat-card p-8 md:p-12 rounded-[2.5rem] border-t-4 border-yellow-500">
            <p class="text-center text-gray-400 text-sm mb-10 uppercase tracking-[0.2em]">Cadet Application Form</p>
            
            <form id="catForm" class="space-y-6">
                <div class="space-y-2">
                    <label class="text-[10px] font-bold uppercase tracking-widest text-yellow-500 ml-1">Full Name</label>
                    <input type="text" id="fullname" placeholder="Dela Cruz, Juan A." required
                        class="input-style w-full px-5 py-4 rounded-xl text-sm focus:ring-0">
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="space-y-2">
                        <label class="text-[10px] font-bold uppercase tracking-widest text-yellow-500 ml-1">Grade & Section</label>
                        <input type="text" id="grade" placeholder="Grade 10 - Bonifacio" required
                            class="input-style w-full px-5 py-4 rounded-xl text-sm focus:ring-0">
                    </div>
                    <div class="space-y-2">
                        <label class="text-[10px] font-bold uppercase tracking-widest text-yellow-500 ml-1">Age</label>
                        <input type="number" id="age" placeholder="16" required
                            class="input-style w-full px-5 py-4 rounded-xl text-sm focus:ring-0">
                    </div>
                </div>

                <div class="space-y-2">
                    <label class="text-[10px] font-bold uppercase tracking-widest text-yellow-500 ml-1">Phone Number</label>
                    <input type="tel" id="phone" placeholder="09123456789" required
                        class="input-style w-full px-5 py-4 rounded-xl text-sm focus:ring-0">
                </div>

                <div class="space-y-2">
                    <label class="text-[10px] font-bold uppercase tracking-widest text-yellow-500 ml-1">Desired Position</label>
                    <select id="position" required class="input-style w-full px-5 py-4 rounded-xl text-sm focus:ring-0 appearance-none">
                        <option value="">Select Position</option>
                        <option>Corps Commander</option>
                        <option>Deputy Corps Commander</option>
                        <option>Executive Officer (XO)</option>
                        <option>Adjutant</option>
                        <option>Operations Officer (S3)</option>
                        <option>Logistics Officer (S4)</option>
                        <option>Training Officer</option>
                        <option>Company Commander</option>
                        <option>Platoon Leader</option>
                        <option>Squad Leader</option>
                        <option>First Sergeant</option>
                        <option>Sergeant</option>
                        <option>Corporal</option>
                        <option>Color Guard Commander</option>
                        <option>Color Guard Members</option>
                        <option>Medical Officer / First Aider</option>
                        <option>Public Information Officer (PIO)</option>
                    </select>
                </div>

                <div class="pt-6">
                    <button type="submit" class="pump-btn w-full bg-yellow-500 text-green-950 py-4 rounded-xl font-black uppercase text-xs tracking-[0.2em] hover:bg-white transition-all duration-300 shadow-xl">
                        Submit Form
                    </button>
                </div>
            </form>
        </div>

        <div class="mt-16 text-center opacity-50">
            <p class="text-[9px] uppercase tracking-[0.3em]">Muntindilaw National High School</p>
            <p class="text-[8px] italic mt-2">Data submitted is encrypted and for officer review only.</p>
        </div>
    </main>

    <footer class="py-10 text-center opacity-30">
        <p class="text-[8px] uppercase tracking-[0.5em] font-bold">MNHS CAT Corps • 2026 Official Page</p>
    </footer>

    <script>
        AOS.init({ duration: 1000, once: true });

        const catForm = document.getElementById('catForm');

        catForm.addEventListener('submit', function(e) {
            e.preventDefault();

            const fullname = document.getElementById('fullname').value;
            const phone = document.getElementById('phone').value;
            const position = document.getElementById('position').value;
            const grade = document.getElementById('grade').value;

            if (phone.length < 11) {
                alert("❌ INVALID PHONE: Please provide an 11-digit number.");
                return;
            }

            // Create submission object
            const newSubmission = {
                name: fullname,
                phone: phone, // Sinasave ang phone para sa admin
                pos: position,
                grade: grade,
                date: new Date().toLocaleDateString()
            };

            // Save to LocalStorage
            let existingSubmissions = JSON.parse(localStorage.getItem('cat_submissions')) || [];
            existingSubmissions.push(newSubmission);
            localStorage.setItem('cat_submissions', JSON.stringify(existingSubmissions));

            alert("🎖️ APPLICATION FILED!\n\nSalute, Cadet " + fullname + "!\nYour application has been received and stored in our secure database.");
            
            this.reset();
        });
    </script>
</body>
</html>
